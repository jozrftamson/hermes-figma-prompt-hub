name: Figma contract check

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - "prompts/figma-layer-contract.txt"
      - "README.md"
      - "evals/cases/*.json"
      - "scripts/check_figma_contract.py"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Check Figma contract consistency
        run: python scripts/check_figma_contract.py

