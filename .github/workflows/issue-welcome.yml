name: Issue welcome

on:
  issues:
    types: [opened]

permissions:
  issues: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Add contributor welcome comment
        uses: actions/github-script@v7
        with:
          script: |
            const issue = context.payload.issue;
            const labels = issue.labels.map(label => label.name);
            const goodFirst = labels.includes("good first issue");
            const body = [
              "Thanks for opening this issue.",
              "",
              goodFirst
                ? "This is a good first issue. A useful first step is to describe the files you expect to touch and the validation command you will run."
                : "A maintainer will review the scope. If you want to work on this, please comment with your intended approach before opening a PR.",
              "",
              "Useful links:",
              "- Contributing guide: https://github.com/jozrftamson/hermes-figma-prompt-hub/blob/main/CONTRIBUTING.md",
              "- Roadmap: https://github.com/jozrftamson/hermes-figma-prompt-hub/blob/main/ROADMAP.md",
              "- Validation command: `python scripts/validate_repo.py`"
            ].join("\\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: issue.number,
              body
            });

