name: PR welcome

on:
  pull_request_target:
    types: [opened]

permissions:
  pull-requests: write

jobs:
  welcome:
    runs-on: ubuntu-latest
    steps:
      - name: Add PR checklist comment
        uses: actions/github-script@v7
        with:
          script: |
            const body = [
              "Thanks for the contribution.",
              "",
              "Before review, please make sure:",
              "- The PR is scoped to one clear change.",
              "- Prompt format changes update `prompts/schema/prompt.schema.json`, examples, and README together.",
              "- Repository validation passes with `python scripts/validate_repo.py`.",
              "- New contributor-facing behavior is documented in `CONTRIBUTING.md` or `README.md`."
            ].join("\\n");
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body
            });

