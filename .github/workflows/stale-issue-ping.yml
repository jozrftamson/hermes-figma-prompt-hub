name: Stale issue ping

on:
  schedule:
    - cron: "0 10 * * 1"
  workflow_dispatch:

permissions:
  issues: write

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping inactive issues without closing them
        uses: actions/github-script@v7
        with:
          script: |
            async function ensureLabel(name, color, description) {
              try {
                await github.rest.issues.getLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name
                });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  name,
                  color,
                  description
                });
              }
            }
            await ensureLabel("stale-pinged", "ededed", "Issue received a friendly inactivity ping");

            const staleDate = new Date();
            staleDate.setDate(staleDate.getDate() - 30);
            const isoDate = staleDate.toISOString().slice(0, 10);
            const query = `repo:${context.repo.owner}/${context.repo.repo} is:issue is:open updated:<${isoDate} -label:stale-pinged`;
            const results = await github.paginate(github.rest.search.issuesAndPullRequests, {
              q: query,
              per_page: 20
            });

            for (const issue of results.slice(0, 10)) {
              await github.rest.issues.addLabels({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                labels: ["stale-pinged"]
              });
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: [
                  "Friendly maintenance ping: this issue has been quiet for about 30 days.",
                  "",
                  "It is not being closed automatically. If it is still useful, please add a short update or next step. If someone wants to work on it, comment with your intended approach."
                ].join("\n")
              });
            }
