name: Good first issue
description: Propose a small task suitable for new contributors.
title: "good first issue: "
labels: ["good first issue", "help wanted"]
body:
  - type: textarea
    id: task
    attributes:
      label: Task
      description: What should be changed?
    validations:
      required: true
  - type: textarea
    id: files
    attributes:
      label: Suggested files
      description: Which files will likely be touched?
    validations:
      required: false
  - type: textarea
    id: done
    attributes:
      label: Done when
      description: What should be true when this task is complete?
    validations:
      required: true

